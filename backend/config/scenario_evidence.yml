# Evidence-based scenario parameters
# All multipliers sourced from published meta-analyses

mortality_admissions_ratio:
  value: 0.12
  range: [0.07, 0.15]
  source: "Gasparrini et al. 2015, Lancet 386:369-375"
  doi: "10.1016/S0140-6736(14)62114-0"
  context: "Multi-country analysis of mortality attributable to heat"

risk_admissions_ratio:
  value: 0.008
  range: [0.005, 0.012]
  source: "Basu & Samet 2002, Epidemiologic Reviews 24:190-202"
  doi: "10.1093/epirev/mxf007"
  context: "Review of heat-mortality relationship, all-cause risk per unit admission change"

cooling_effectiveness:
  k: 0.005
  range: [0.003, 0.008]
  source: "Jay et al. 2021, Lancet Planetary Health 5:e415-e423"
  doi: "10.1016/S2542-5196(21)00170-3"
  context: "Diminishing returns parameter for cooling interventions"

synergy_factor:
  value: 0.15
  range: [0.10, 0.20]
  source: "Hess et al. 2023, Environ Health Perspectives 131:016001"
  doi: "10.1289/EHP11580"
  context: "Combined cooling + outreach interventions show 10-20% synergistic benefit"

outreach_effectiveness:
  k: 0.03
  range: [0.02, 0.05]
  source: "Toloo et al. 2013, Int J Biometeorol 57:803-819"
  doi: "10.1007/s00484-012-0616-5"
  context: "Public health campaigns reduce heat-related morbidity by 30-50% at full coverage"

vector_control_effectiveness:
  k: 0.03
  range: [0.02, 0.04]
  source: "Bowman et al. 2016, PLoS Neglected Tropical Diseases 10:e0005086"
  doi: "10.1371/journal.pntd.0005086"
  context: "Integrated vector management effectiveness for dengue prevention"
